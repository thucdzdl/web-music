<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Music Player</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <h2>🎵 MusicApp</h2>
        <ul>
            <li><i class="fas fa-home"></i> Khám phá</li>
            <li><i class="fas fa-chart-line"></i> BXH</li>
            <li><i class="fas fa-radio"></i> Radio</li>
            <li><i class="fas fa-heart"></i> Yêu thích</li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <input type="text" placeholder="Tìm kiếm bài hát, nghệ sĩ...">
        </header>

        <section class="hero">
            <h1>Nhạc Mới Mỗi Ngày</h1>
            <p>Thưởng thức những giai điệu hot nhất hiện nay.</p>
        </section>

        <h3>Mới Phát Hành</h3>
        <div class="song-grid">
            {% for song in songs %}
            <div class="song-card">
                <img src="{{ song.img }}" alt="cover">
                <h4>{{ song.name }}</h4>
                <p>{{ song.title }}</p>
                <button class="play-btn"><i class="fas fa-play"></i></button>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <p>Đang chọn: <b>Chọn một bài hát</b></p>
        </div>
        <div class="controls">
            <i class="fas fa-step-backward"></i>
            <i class="fas fa-play-circle fa-2x"></i>
            <i class="fas fa-step-forward"></i>
        </div>
        <div class="volume">
            <i class="fas fa-volume-up"></i>
            <input type="range" min="0" max="100">
        </div>
    </div>
</body>
</html>
