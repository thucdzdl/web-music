<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - H2T Music</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            <h1>H2T Music</h1>
        </div>
        <form class="auth-form">
            <h2>Đăng ký tài khoản</h2>
            <div class="input-group">
                <label>Bạn tên là gì?</label>
                <input type="text" placeholder="Nhập tên hiển thị" required>
                <small>Tên này sẽ xuất hiện trên hồ sơ của bạn.</small>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Nhập email của bạn" required>
            </div>
            
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn-auth">Đăng ký</button>
        </form>
        <div class="auth-footer">
            <p>Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
        </div>
    </div>
</body>
</html>
